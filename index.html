<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Propagation planner for radio amateurs — ON3VZ/JO20ev">
  <meta name="theme-color" content="#1A1F2E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <!-- Design system — order matters -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/timeline.css">
  <link rel="stylesheet" href="css/setup.css">

  <title>Propagation Watch</title>
</head>
<body>

  <!-- Navigation — desktop top / mobile bottom -->
  <nav id="app-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-item active" data-screen="home" onclick="showScreen('home')" role="button" tabindex="0">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <circle cx="10" cy="10" r="3.5" fill="currentColor"/>
        <circle cx="10" cy="10" r="6.5" stroke="currentColor" stroke-width="1" fill="none" opacity=".5"/>
        <circle cx="10" cy="10" r="9"   stroke="currentColor" stroke-width=".5" fill="none" opacity=".25"/>
        <line x1="10" y1="1" x2="10" y2="4.5" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      Overview
    </div>
    <div class="nav-item" data-screen="setup" onclick="window._pwInitNewWatch && window._pwInitNewWatch()" role="button" tabindex="0">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.2"/>
        <line x1="10" y1="4" x2="10" y2="16" stroke="currentColor" stroke-width="1.5"/>
        <line x1="4"  y1="10" x2="16" y2="10" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      + Watch
    </div>
    <div class="nav-item" data-screen="settings" onclick="showScreen('settings'); window._pwInitSettings && window._pwInitSettings()" role="button" tabindex="0">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.2"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42"
              stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Settings
    </div>
  </nav>

  <!-- Screens -->
  <main id="app-root" role="main">

    <!-- ── Home screen ── -->
    <section id="screen-home" class="screen active" aria-label="Overview">
      <h1 class="sr-only">Propagation Watch — Overview</h1>

      <!-- Storm banner (hidden by default) -->
      <div id="storm-banner" class="storm-banner" hidden aria-live="polite"></div>

      <!-- Status bar -->
      <div id="status-bar" class="status-bar" role="status" aria-live="polite">
        <span class="status-bar__label" style="font-size:var(--text-xs);color:var(--color-text-muted)">Loading data…</span>
      </div>

      <!-- 24h Timeline -->
      <div class="timeline-wrap" aria-label="24-hour propagation timeline">
        <div class="timeline-header">
          <span>24h timeline</span>
          <span id="timeline-now" class="mono" aria-live="polite"></span>
        </div>
        <div class="timeline-scroll" role="img" aria-label="Timeline showing band conditions over 24 hours">
          <svg id="timeline-svg" class="timeline-svg" width="100%" height="80"
               viewBox="0 0 600 80" preserveAspectRatio="xMinYMid meet">
            <text x="50%" y="50%" text-anchor="middle" fill="var(--color-text-muted)" font-size="13">Loading…</text>
          </svg>
        </div>
      </div>

      <!-- Watch list -->
      <div id="watch-list" class="watches-grid" role="list" aria-label="Watch list">
        <div style="text-align:center;padding:var(--space-8);color:var(--color-text-muted);font-size:var(--text-sm)">
          Loading watches…
        </div>
      </div>

      <!-- FAB -->
      <div class="fab-row">
        <button class="btn btn--secondary" onclick="window._pwInitNewWatch && window._pwInitNewWatch()">Quick check</button>
        <button class="btn btn--primary"   onclick="window._pwInitNewWatch && window._pwInitNewWatch()">+ Watch</button>
      </div>
    </section>

    <!-- ── Watch detail screen ── -->
    <section id="screen-detail" class="screen" aria-label="Watch detail"></section>

    <!-- ── Setup / new watch screen ── -->
    <section id="screen-setup" class="screen" aria-label="Setup">
      <div class="setup-screen">
        <div class="setup-progress" role="progressbar" aria-valuemin="1" aria-valuemax="4">
          <div class="setup-progress__dot setup-progress__dot--active"></div>
          <div class="setup-progress__dot"></div>
          <div class="setup-progress__dot"></div>
          <div class="setup-progress__dot"></div>
        </div>
        <div id="setup-step-label" class="setup-step-label">Step 1 of 4</div>
        <div id="setup-content"></div>
      </div>
    </section>

    <!-- ── Settings screen ── -->
    <section id="screen-settings" class="screen" aria-label="Settings">
      <h2 style="font-size:var(--text-lg);font-weight:var(--weight-bold);margin-bottom:var(--space-4)">Settings</h2>

      <!-- Data Sources — API test -->
      <div class="card" style="margin-bottom:var(--space-4)">
        <h3 style="font-size:var(--text-md);font-weight:var(--weight-bold);margin-bottom:var(--space-3)">
          📡 Data Sources
        </h3>
        <div id="api-test-panel">
          <div style="color:var(--color-text-muted);font-size:var(--text-sm)">
            Tap "Test API" to check NOAA connectivity.
          </div>
        </div>
      </div>

      <!-- Power & License -->
      <div class="card" style="margin-bottom:var(--space-4)">
        <h3 style="font-size:var(--text-md);font-weight:var(--weight-bold);margin-bottom:var(--space-3)">
          ⚡ Power &amp; License
        </h3>
        <div class="field" style="margin-bottom:var(--space-4)">
          <label class="field__label">License class</label>
          <div style="display:flex;flex-direction:column;gap:var(--space-2)">
            <button class="btn btn--secondary" id="lic-C" data-lic="C"
                    onclick="window._pwSelectLicClass('C',this)"
                    style="justify-content:space-between;min-height:44px;padding:0 var(--space-4);width:100%">
              <span style="font-weight:var(--weight-bold)">Class C</span>
              <span class="mono" style="font-size:var(--text-xs);color:var(--color-text-secondary)">max 25W · Novice / Belgian HAREC candidate</span>
            </button>
            <button class="btn btn--secondary" id="lic-B" data-lic="B"
                    onclick="window._pwSelectLicClass('B',this)"
                    style="justify-content:space-between;min-height:44px;padding:0 var(--space-4);width:100%">
              <span style="font-weight:var(--weight-bold)">Class B</span>
              <span class="mono" style="font-size:var(--text-xs);color:var(--color-text-secondary)">max 100W · Intermediate</span>
            </button>
            <button class="btn btn--primary" id="lic-A" data-lic="A"
                    onclick="window._pwSelectLicClass('A',this)"
                    style="justify-content:space-between;min-height:44px;padding:0 var(--space-4);width:100%">
              <span style="font-weight:var(--weight-bold)">Class A</span>
              <span class="mono" style="font-size:var(--text-xs)">max 1500W · HAREC full license</span>
            </button>
          </div>
        </div>
        <div class="field" style="margin-bottom:var(--space-4)">
          <label class="field__label">
            Transmit power:
            <span id="pwr-display" class="mono">100W</span>
            <span id="pwr-db" style="font-size:var(--text-xs);color:var(--color-text-muted)"> (reference 100W)</span>
          </label>
          <input type="range" id="pwr-slider" min="1" max="1500" step="1" value="100"
                 oninput="window._pwUpdatePower(this.value)" style="width:100%"/>
          <div style="display:flex;justify-content:space-between;
                      font-size:10px;color:var(--color-text-muted);
                      font-family:var(--font-mono);margin-top:var(--space-1)">
            <span>1W</span><span id="pwr-min-qrp">QRP 5W</span>
            <span id="pwr-mid">25W</span><span>100W</span>
            <span id="pwr-max-label">25W</span>
          </div>
          <div class="field__hint" id="pwr-hint" style="margin-top:var(--space-2)"></div>
        </div>
        <div class="field">
          <label style="display:flex;justify-content:space-between;align-items:center;cursor:pointer">
            <span class="field__label" style="margin-bottom:0">QRP mode (≤ 5W) — POTA/SOTA</span>
            <label class="toggle">
              <input type="checkbox" class="toggle__input" id="qrp-toggle"
                     onchange="window._pwToggleQRP(this.checked)"/>
              <span class="toggle__track"></span>
            </label>
          </label>
        </div>
      </div>

      <!-- Location -->
      <div class="card" style="margin-bottom:var(--space-4)">
        <h3 style="font-size:var(--text-md);font-weight:var(--weight-bold);margin-bottom:var(--space-3)">
          📍 Location
        </h3>
        <div class="field">
          <label class="field__label">Grid square</label>
          <input class="field__input" id="grid-input" placeholder="e.g. JO20ev"
                 autocapitalize="characters"/>
        </div>
        <button class="btn btn--primary" style="margin-top:var(--space-3);width:100%"
                onclick="window._pwSaveLocation()">Save location</button>
      </div>

      <!-- Display -->
      <div class="card">
        <h3 style="font-size:var(--text-md);font-weight:var(--weight-bold);margin-bottom:var(--space-3)">
          🎨 Display
        </h3>
        <div class="field" style="margin-bottom:var(--space-4)">
          <label class="field__label">Language</label>
          <select class="field__input" id="lang-select"
                  onchange="window._pwChangeLang(this.value)">
            <option value="en">English</option>
            <option value="nl">Nederlands</option>
          </select>
        </div>
        <div class="field">
          <label style="display:flex;justify-content:space-between;align-items:center">
            <span class="field__label" style="margin-bottom:0">Light theme</span>
            <label class="toggle">
              <input type="checkbox" class="toggle__input" id="theme-toggle"
                     onchange="window._pwToggleTheme(this.checked)"/>
              <span class="toggle__track"></span>
            </label>
          </label>
        </div>
      </div>
    </section>

    <!-- ── Storm screen ── -->
    <section id="screen-storm" class="screen" aria-label="Stormshadow — Kp recovery">
      <div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-6)">
        <button class="btn btn--icon" onclick="showScreen('home')" style="width:40px;height:40px;min-height:unset">←</button>
        <span style="font-weight:var(--weight-bold);font-size:var(--text-md)">Stormshadow — Kp recovery</span>
      </div>
      <div id="storm-detail" style="font-size:var(--text-sm);color:var(--color-text-secondary)">No active storm.</div>
    </section>

  </main>

  <!-- Toast container -->
  <div id="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>

  <!-- SunCalc — local copy, no CDN -->
  <script>
    // Synchronous globals — available immediately, before any module loads
    // This prevents "showScreen is not defined" errors when nav is clicked
    
    var _pendingScreen = null;
    
    window.showScreen = function(id) {
      // If modules not yet loaded, queue the screen
      if (!window._pwModulesLoaded) {
        _pendingScreen = id;
        return;
      }
      _doShowScreen(id);
    };
    
    function _doShowScreen(id) {
      document.querySelectorAll('.screen').forEach(function(s) {
        s.classList.remove('active');
      });
      var el = document.getElementById('screen-' + id);
      if (el) el.classList.add('active');
      
      document.querySelectorAll('.nav-item').forEach(function(n) {
        n.classList.toggle('active', n.dataset.screen === id);
      });
    }
    window._doShowScreen = _doShowScreen;
    
    // Stubs — replaced by real functions when modules load
    window._pwInitNewWatch  = function() { _pendingScreen = 'setup_new'; };
    window._pwInitSettings  = function() { _pendingScreen = 'settings'; };
    window._pwEvaluate      = function() {};
    window._pwHandleAlarm   = function() {};
    window._pwHandleExport  = function() {};
    window._pwHandleDelete  = function() {};
    window._pwTestAPI       = function() {};
    window._pwSaveCfg       = function() {};
    window._pwSelectLicClass= function() {};
    window._pwUpdatePower   = function() {};
    window._pwToggleQRP     = function() {};
    window._pwToggleTheme   = function() {};
    window._pwChangeLang    = function() {};
    window._pwSaveLocation  = function() {};
    window._pwFetchNOAA     = function() {};
    window.showToast        = function(msg, type) { console.log(type + ': ' + msg); };
  </script>
  <script src="lib/suncalc.js?v=5"></script>

  <!-- App entry point -->
  <script type="module" src="js/app.js?v=5"></script>
  <script>
    // Catch module load errors and show them visibly
    window.addEventListener('error', function(e) {
      console.error('Global error:', e.message, e.filename, e.lineno);
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error('Unhandled rejection:', e.reason);
    });
  </script>


</body>
</html>
