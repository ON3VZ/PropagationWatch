<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1A1F2E">
<link rel="manifest" href="manifest.json">
<title>Propagation Watch</title>
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:#1A1F2E;color:#E8EAF0;min-height:100dvh}

/* ── CSS Variables ── */
:root{
  --bg1:#1A1F2E;--bg2:#222736;--bg3:#2A3044;--bg4:#313754;
  --tx1:#E8EAF0;--tx2:#9BA3BF;--tx3:#5C6480;
  --bdr:#313754;--bdr2:#262B3D;
  --good:#1D9E75;--good-bg:#0D3D2D;--good-tx:#4ECFA0;
  --warn:#EF9F27;--warn-bg:#3D2A08;--warn-tx:#F9C46A;
  --bad:#E24B4A; --bad-bg:#3D1010;  --bad-tx:#F09090;
  --mono:'Courier New',monospace;
  --r8:8px;--r12:12px;
  --nav-h:52px;
}
[data-theme="light"]{
  --bg1:#F0F2F8;--bg2:#E4E7F0;--bg3:#D8DCE8;--bg4:#CDD2E0;
  --tx1:#1A1F2E;--tx2:#3D4560;--tx3:#6B7494;
  --bdr:#BEC4D4;--bdr2:#CDD2E0;
  --good-tx:#0E7A58;--warn-tx:#A96B0A;--bad-tx:#C02020;
}

/* ── Layout ── */
#nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
     background:var(--bg2);border-top:1px solid var(--bdr);
     display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;
         justify-content:center;gap:3px;font-size:11px;color:var(--tx3);
         cursor:pointer;border-top:2px solid transparent;padding:6px 4px}
.nav-tab.active{color:var(--good);border-top-color:var(--good)}
#main{padding:12px 12px calc(var(--nav-h) + 12px + env(safe-area-inset-bottom))}

/* ── Screens ── */
.screen{display:none}
.screen.active{display:block}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r12);
      padding:14px 16px;margin-bottom:12px}

/* ── Watch card ── */
.wcard{border-left:3px solid var(--bdr);cursor:pointer;transition:background .1s}
.wcard:hover{background:var(--bg3)}
.wcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.wcard-name{font-weight:600;font-size:15px}
.wcard-meta{font-size:11px;color:var(--tx2);font-family:var(--mono);margin-top:2px}
.wcard-actions{display:flex;gap:6px}
.wcard-bottom{display:flex;justify-content:space-between;align-items:center}
.wcard-state{font-size:12px;font-weight:600}
.wcard-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.wcard-pct{font-family:var(--mono);font-size:22px;font-weight:700;margin-left:12px}
.pwr-badge{font-family:var(--mono);font-size:10px;background:var(--bg3);
           border:1px solid var(--bdr);border-radius:20px;padding:1px 7px;
           margin-left:8px;vertical-align:middle}

/* ── Status bar ── */
#statusbar{display:flex;align-items:center;gap:12px;font-family:var(--mono);
           font-size:12px;padding:8px 0;border-bottom:1px solid var(--bdr2);
           margin-bottom:12px;color:var(--tx2)}
#statusbar .val{color:var(--tx1);font-weight:600}
#statusbar .kp-ok{color:var(--good-tx)}
#statusbar .kp-warn{color:var(--warn-tx)}
#statusbar .kp-bad{color:var(--bad-tx)}
.refresh-btn{margin-left:auto;background:var(--bg3);border:1px solid var(--bdr);
             border-radius:6px;padding:4px 10px;color:var(--tx2);cursor:pointer;
             font-size:12px}

/* ── Timeline ── */
#timeline-wrap{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r12);
               padding:10px;margin-bottom:12px}
#timeline-hdr{display:flex;justify-content:space-between;font-size:11px;
              color:var(--tx3);font-family:var(--mono);margin-bottom:6px}
#timeline-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
#timeline-svg{display:block}

/* ── FAB row ── */
.fab-row{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.fab{border:none;border-radius:var(--r8);padding:11px 18px;font-size:13px;
     font-weight:600;cursor:pointer}
.fab-pri{background:var(--good);color:#fff}
.fab-sec{background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr)}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 16px;color:var(--tx3);font-size:14px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;
     min-height:44px;padding:0 16px;border-radius:var(--r8);border:none;
     font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btn-pri{background:var(--good);color:#fff}
.btn-sec{background:var(--bg3);color:var(--tx1);border:1px solid var(--bdr)}
.btn-ico{width:36px;height:36px;min-height:unset;padding:0;background:var(--bg3);
         border:1px solid var(--bdr);border-radius:var(--r8);color:var(--tx2);font-size:15px}
.btn-del{color:var(--bad-tx)}

/* ── Form ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--tx2);margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--bdr);
  border-radius:var(--r8);padding:11px 12px;color:var(--tx1);font-size:14px;
  font-family:inherit;outline:none}
.field input:focus,.field select:focus{border-color:var(--good)}
.field-hint{font-size:11px;color:var(--good);font-family:var(--mono);margin-top:4px;min-height:14px}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-hint-warn{color:var(--warn-tx)}

/* ── Suggestion grid ── */
.sugg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sugg-btn{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r8);
          padding:10px 12px;cursor:pointer;text-align:left;transition:border-color .1s}
.sugg-btn:hover,.sugg-btn.sel{border-color:var(--good)}
.sugg-pre{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--tx1)}
.sugg-name{font-size:11px;color:var(--tx2);margin-top:2px}
.sugg-dist{font-size:10px;color:var(--tx3);font-family:var(--mono)}

/* ── Setup progress ── */
.prog-bar{display:flex;gap:5px;margin-bottom:20px}
.prog-dot{height:4px;flex:1;border-radius:2px;background:var(--bdr)}
.prog-dot.done{background:var(--good)}
.prog-dot.active{background:var(--warn)}
.setup-title{font-size:20px;font-weight:700;margin-bottom:6px}
.setup-sub{font-size:13px;color:var(--tx2);margin-bottom:20px;line-height:1.5}
.setup-skip{width:100%;background:none;border:none;color:var(--tx3);
            font-size:13px;cursor:pointer;padding:10px;margin-top:4px}

/* ── Toggle ── */
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.toggle-wrap{position:relative;width:50px;height:28px;flex-shrink:0}
.toggle-wrap input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--bg4);border:1px solid var(--bdr);
              border-radius:14px;cursor:pointer;transition:background .2s}
.toggle-wrap input:checked+.toggle-track{background:var(--good);border-color:var(--good)}
.toggle-track::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;
                     background:#fff;border-radius:50%;transition:transform .2s}
.toggle-wrap input:checked+.toggle-track::after{transform:translateX(22px)}

/* ── Detail screen ── */
.det-back{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.det-back-btn{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r8);
              width:40px;height:40px;font-size:18px;cursor:pointer;color:var(--tx1);
              display:flex;align-items:center;justify-content:center}
.big-num{font-family:var(--mono);font-size:52px;font-weight:700;line-height:1}
.big-lbl{font-size:12px;color:var(--tx2);margin-top:4px}
.info-table{width:100%}
.info-row{display:flex;justify-content:space-between;padding:5px 0;
          border-bottom:1px solid var(--bdr2);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--tx2)}
.info-val{font-family:var(--mono);color:var(--tx1)}
.next-win-box{border-radius:var(--r8);padding:14px;margin:12px 0}
.det-btn-row{display:flex;gap:8px;margin-top:12px}
.det-btn-row .btn{margin-top:0}

/* ── Storm banner ── */
#storm-banner{background:var(--bad-bg);border:1px solid var(--bad);border-radius:var(--r8);
              padding:10px 14px;margin-bottom:12px;display:none;
              justify-content:space-between;align-items:center;gap:12px}
#storm-banner.show{display:flex}

/* ── Toast ── */
#toasts{position:fixed;bottom:calc(var(--nav-h) + 8px + env(safe-area-inset-bottom));
        left:12px;right:12px;z-index:200;display:flex;flex-direction:column;gap:6px}
.toast{padding:12px 14px;border-radius:var(--r8);font-size:13px;
       animation:toast-in .2s ease;pointer-events:none}
.toast-ok{background:var(--good-bg);color:var(--good-tx);border:1px solid var(--good)}
.toast-warn{background:var(--warn-bg);color:var(--warn-tx);border:1px solid var(--warn)}
.toast-err{background:var(--bad-bg);color:var(--bad-tx);border:1px solid var(--bad)}
.toast-info{background:var(--bg4);color:var(--tx1);border:1px solid var(--bdr)}
@keyframes toast-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Settings ── */
.settings-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.lic-list{display:flex;flex-direction:column;gap:8px}
.lic-btn{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r8);
         padding:12px 16px;display:flex;justify-content:space-between;align-items:center;
         cursor:pointer;font-size:14px;color:var(--tx1)}
.lic-btn.active{background:var(--good-bg);border-color:var(--good);color:var(--good-tx)}
.lic-max{font-family:var(--mono);font-size:12px;color:var(--tx3)}
.lic-btn.active .lic-max{color:var(--good-tx)}
.api-row{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r8);
         padding:10px 12px;margin-bottom:6px}
.api-row-top{display:flex;justify-content:space-between;align-items:center}
.api-url{font-size:10px;color:var(--tx3);font-family:var(--mono);margin-top:3px;word-break:break-all}
.api-err{font-size:10px;color:var(--bad-tx);font-family:var(--mono);margin-top:2px}
</style>
</head>
<body>

<!-- Nav -->
<nav id="nav">
  <div class="nav-tab active" id="tab-home" onclick="goHome()">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="3.5" fill="currentColor"/>
      <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.2" fill="none" opacity=".5"/>
      <line x1="11" y1="1" x2="11" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Overview
  </div>
  <div class="nav-tab" id="tab-setup" onclick="goNewWatch()">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="9" stroke="currentColor" stroke-width="1.2"/>
      <line x1="11" y1="5" x2="11" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="5" y1="11" x2="17" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    + Watch
  </div>
  <div class="nav-tab" id="tab-settings" onclick="goSettings()">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="3" stroke="currentColor" stroke-width="1.2"/>
      <path d="M11 3v2M11 17v2M3 11h2M17 11h2M5.64 5.64l1.42 1.42M13.94 13.94l1.42 1.42M5.64 16.36l1.42-1.42M13.94 8.06l1.42-1.42"
            stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    Settings
  </div>
</nav>

<!-- Toasts -->
<div id="toasts"></div>

<main id="main">

<!-- ══ HOME ══ -->
<section id="screen-home" class="screen active">
  <div id="storm-banner">
    <div>
      <div id="storm-title" style="font-weight:600;color:var(--bad-tx)"></div>
      <div id="storm-sub" style="font-size:12px;color:var(--bad-tx)"></div>
    </div>
  </div>
  <div id="statusbar">
    <span>Kp <span class="val" id="sb-kp">—</span></span>
    <span>SFI <span class="val" id="sb-sfi">—</span></span>
    <span id="sb-g" style="font-size:11px"></span>
    <span id="sb-age" style="font-size:11px"></span>
    <button class="refresh-btn" onclick="doRefresh()">↺</button>
  </div>
  <div id="timeline-wrap">
    <div id="timeline-hdr">
      <span>24h timeline</span>
      <span id="tl-now" style="font-family:var(--mono)"></span>
    </div>
    <div id="timeline-scroll">
      <svg id="timeline-svg" height="80" style="display:block"></svg>
    </div>
  </div>
  <div id="watch-list"></div>
  <div class="fab-row">
    <button id="btn-quickcheck" class="fab fab-sec" onclick="goNewWatch()">Quick check</button>
    <button id="btn-addwatch" class="fab fab-pri" onclick="goNewWatch()">+ Watch</button>
  </div>
</section>

<!-- ══ WATCH DETAIL ══ -->
<section id="screen-detail" class="screen">
  <div class="det-back">
    <button class="det-back-btn" onclick="goHome()">←</button>
    <span id="det-title" style="font-weight:600;font-size:15px"></span>
  </div>
  <div id="det-body"></div>
</section>

<!-- ══ SETUP ══ -->
<section id="screen-setup" class="screen">
  <div id="setup-body"></div>
</section>

<!-- ══ SETTINGS ══ -->
<section id="screen-settings" class="screen">
  <div class="settings-head">
    <button class="det-back-btn" onclick="goHome()">←</button>
    <h2 id="sh-settings" style="font-size:18px;font-weight:700">Settings</h2>
  </div>

  <!-- API -->
  <div class="card">
    <h3 style="font-weight:600;margin-bottom:12px"><span id="sh-data">📡 Data Sources</span></h3>
    <div id="api-status-box" style="font-size:13px;color:var(--tx2);margin-bottom:10px">
      Tap Test API to check NOAA connectivity.
    </div>
    <button class="btn btn-sec" id="api-test-btn" onclick="doTestAPI()" style="margin-top:0">
      🔌 Test API
    </button>
    <div id="api-endpoints" style="margin-top:10px"></div>
  </div>

  <!-- Power -->
  <div class="card">
    <h3 style="font-weight:600;margin-bottom:12px"><span id="sh-power">⚡ Power &amp; License</span></h3>
    <div style="margin-bottom:12px">
      <label id="lbl-licclass" style="font-size:12px;color:var(--tx2);display:block;margin-bottom:8px">License class</label>
      <div class="lic-list">
        <button class="lic-btn" id="lic-C" onclick="setLicClass('C')">
          <span style="font-weight:700">Class C</span>
          <span class="lic-max">max 25W</span>
        </button>
        <button class="lic-btn" id="lic-B" onclick="setLicClass('B')">
          <span style="font-weight:700">Class B</span>
          <span class="lic-max">max 100W</span>
        </button>
        <button class="lic-btn active" id="lic-A" onclick="setLicClass('A')">
          <span style="font-weight:700">Class A</span>
          <span class="lic-max">max 1500W</span>
        </button>
      </div>
    </div>
    <div>
      <label style="font-size:12px;color:var(--tx2);display:block;margin-bottom:6px">
        <span id="lbl-power">Transmit power</span>: <span id="pwr-val" style="font-family:var(--mono);color:var(--tx1)">100W</span>
        <span id="pwr-db" style="font-size:11px;color:var(--tx3)"> (ref 100W)</span>
      </label>
      <input type="range" id="pwr-slider" min="1" max="1500" step="1" value="100"
             oninput="setPower(this.value)" style="width:100%"/>
      <div style="display:flex;justify-content:space-between;font-size:10px;
                  color:var(--tx3);font-family:var(--mono);margin-top:4px">
        <span>1W</span><span>5W</span><span id="pwr-mid">100W</span><span id="pwr-max">1500W</span>
      </div>
      <div id="pwr-hint" style="font-size:12px;color:var(--tx3);margin-top:6px"></div>
    </div>
    <div class="toggle-row" style="margin-top:14px">
      <span id="lbl-qrp" style="font-size:13px">QRP mode (≤ 5W)</span>
      <label class="toggle-wrap">
        <input type="checkbox" id="qrp-tog" onchange="setQRP(this.checked)"/>
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <!-- Location -->
  <div class="card">
    <h3 style="font-weight:600;margin-bottom:12px"><span id="sh-loc">📍 Location</span></h3>
    <div class="field">
      <label id="lbl-grid">Grid square</label>
      <input id="grid-inp" placeholder="e.g. JO20ev" autocapitalize="characters" style="text-transform:uppercase"/>
    </div>
    <button id="btn-saveloc" class="btn btn-pri" onclick="saveLocation()">Save location</button>
  </div>

  <!-- Display -->
  <div class="card">
    <h3 style="font-weight:600;margin-bottom:12px"><span id="sh-display">🎨 Display</span></h3>
    <div class="field" style="margin-bottom:12px">
      <label id="lbl-lang">Language</label>
      <select id="lang-sel" onchange="saveLang(this.value)">
        <option value="en">English</option>
        <option value="nl">Nederlands</option>
      </select>
    </div>
    <div class="toggle-row">
      <span id="lbl-theme" style="font-size:13px">Light theme</span>
      <label class="toggle-wrap">
        <input type="checkbox" id="theme-tog" onchange="setTheme(this.checked)"/>
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>
</section>

</main>

<!-- SunCalc -->
<script src="lib/suncalc.js"></script>

<script src="js/app.js"></script>
</body>
</html>
